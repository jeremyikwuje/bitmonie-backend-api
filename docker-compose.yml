services:
  postgres:
    image: postgres:16
    container_name: bitmonie-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: bitmonie
      POSTGRES_PASSWORD: bitmonie
      POSTGRES_DB: bitmonie_db
    ports:
      - "55432:5432"
    volumes:
      - bitmonie_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bitmonie -d bitmonie_db"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: bitmonie-redis
    restart: unless-stopped
    ports:
      - "56379:6379"
    volumes:
      - bitmonie_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── production services (profile: prod) ───────────────────────────────────
  # Single image, one service per process. Run with: docker compose --profile prod up
  api:
    profiles: ["prod"]
    build: .
    image: bitmonie
    restart: unless-stopped
    env_file: .env
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
    ports:
      - "3000:3000"

  worker-price-feed:
    profiles: ["prod"]
    image: bitmonie
    restart: unless-stopped
    env_file: .env
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
    command: ["node", "dist/workers/price-feed.worker.js"]

  worker-liquidation:
    profiles: ["prod"]
    image: bitmonie
    restart: unless-stopped
    env_file: .env
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
    command: ["node", "dist/workers/liquidation-monitor.worker.js"]

  worker-loan-expiry:
    profiles: ["prod"]
    image: bitmonie
    restart: unless-stopped
    env_file: .env
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
    command: ["node", "dist/workers/loan-expiry.worker.js"]

  worker-loan-reminder:
    profiles: ["prod"]
    image: bitmonie
    restart: unless-stopped
    env_file: .env
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
    command: ["node", "dist/workers/loan-reminder.worker.js"]

  worker-outflow-reconciler:
    profiles: ["prod"]
    image: bitmonie
    restart: unless-stopped
    env_file: .env
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
    command: ["node", "dist/workers/outflow-reconciler.worker.js"]

  worker-disbursement-digest:
    profiles: ["prod"]
    image: bitmonie
    restart: unless-stopped
    env_file: .env
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
    command: ["node", "dist/workers/disbursement-on-hold-digest.worker.js"]

volumes:
  bitmonie_postgres_data:
  bitmonie_redis_data:
